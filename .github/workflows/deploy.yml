name: 🗑️ Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📁 Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      
      - name: 🏗️ Build
        run: |
          # WASTE 是纯静态网站，直接复制 site 目录
          mkdir -p public
          if [ -d "site" ]; then
            cp -r site/* public/
          else
            cp *.html *.css *.js *.png *.jpg public/ 2>/dev/null || true
          fi
          echo "✅ Build complete"
          ls -lh public/
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
